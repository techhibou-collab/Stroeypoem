services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: poetry_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  db-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      - db
    environment:
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    volumes:
      - ./backend/src/init.sql:/init.sql:ro
    entrypoint: /bin/bash
    command: >-
      -c "
      for tool in /opt/mssql-tools18/bin/sqlcmd /opt/mssql-tools/bin/sqlcmd; do
        if [ -x \"$$tool\" ]; then
          SQLCMD=\"$$tool\";
          break;
        fi;
      done;
      if [ -z \"$$SQLCMD\" ]; then
        echo 'sqlcmd not found in mssql-tools image';
        exit 1;
      fi;
      until \"$$SQLCMD\" -S db -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" >/dev/null 2>&1; do
        sleep 2;
      done;
      \"$$SQLCMD\" -S db -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"IF DB_ID('poetry_db') IS NULL CREATE DATABASE poetry_db;\";
      \"$$SQLCMD\" -S db -U sa -P \"$$MSSQL_SA_PASSWORD\" -d poetry_db -C -i /init.sql
      "
    restart: "no"


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5005:5005"
    environment:
      PORT: "5005"
      DB_HOST: db
      DB_PORT: "1433"
      DB_NAME: poetry_db
      DB_USER: sa
      DB_PASSWORD: "YourStrong!Passw0rd"
      JWT_SECRET: "change-me-in-production"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5005}
    ports:
      - "3000:3000"
    depends_on:
      - backend


volumes:
  sqlserver_data:
